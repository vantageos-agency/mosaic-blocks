name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same PR/branch so pushes don't queue
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout (full history so react-doctor --diff origin/main works) ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Setup pnpm ────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 3. Setup Node 22 + restore pnpm store cache ──────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      # ── 4. Install root deps ─────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Lint (Biome — 0 warnings) ─────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── 6. Typecheck (tsc --noEmit — 0 errors) ───────────────────────────────
      - name: Typecheck
        run: pnpm typecheck

      # ── 7. Tests (Vitest — all green) ────────────────────────────────────────
      - name: Test
        run: pnpm test

      # ── 8. Parse / syntax guard ───────────────────────────────────────────────
      #    Uses TS compiler API getSyntacticDiagnostics over src/**/*.ts(x).
      #    Mirrors vantage-immo #89 bundleGuard fix-pattern (m978csm3).
      - name: Parse guard
        run: pnpm parse-guard

      # ── 8b. Release artifacts guard (mosaic-blocks train TOCTOU fix) ─────────
      #    PR-ONLY. A component PR's diff must carry NEITHER the version
      #    (package.json/src/version.ts) NOR a README/catalog count claim —
      #    both are DERIVED on main, once, after this PR merges (see the
      #    derive-release-artifacts job below). Escape hatch: the PR's head
      #    commit message carries `// allow-release-artifacts: <reason>`.
      #
      #    RELEASE_GUARD_HEAD_REF is not decoration. On pull_request, checkout
      #    leaves HEAD on the synthetic `Merge <sha> into <sha>` commit — a
      #    message nobody wrote, which can never carry the marker. The guard
      #    used to read it, which made its own escape hatch unopenable on the
      #    one path that needs it. It must read the commit the author wrote.
      - name: Release artifacts guard
        if: github.event_name == 'pull_request'
        env:
          RELEASE_GUARD_HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: node scripts/release-artifacts-guard.mjs

      # ── 8c. NO docs-counts check here. Deliberate, and worth reading. ───────
      #
      #    A component PR that adds an export makes the README/catalog counts
      #    legitimately stale — and the release-artifacts guard (step 8b) FORBIDS
      #    that PR from touching them, because they are derived on main.
      #
      #    Checking the counts here therefore demanded the one edit the guard
      #    forbids: every export-adding PR became unmergeable. That deadlock was
      #    real, it blocked a whole component train, and it was introduced by the
      #    very change that closed the version TOCTOU.
      #
      #    The counts are now verified where they are PRODUCED — on main, inside
      #    the derive job, on the freshly regenerated docs (see below). Refusal
      #    on the PR side, verification on the main side: neither is dropped.

      # ── 8d. The guards' own probes ──────────────────────────────────────────
      #    A guard that is wired but never proven to BITE is indistinguishable
      #    from an absent guard. Both probes mutate REAL historical material
      #    (the 4 component commits of the train) and assert the mutation
      #    LANDED before reading any verdict; both prove the refusal branches,
      #    not just the happy path. They run on every CI pass so a future edit
      #    that blinds a guard turns the build red instead of passing quietly.
      - name: Probe — release artifacts guard bites
        run: bash scripts/tests/probe-release-artifacts-guard.sh

      - name: Probe — registry.json derive + guard bite
        run: bash scripts/tests/probe-registry-json-derive.sh

      - name: Probe — version resolver refuses loudly (unknown flag, dead registry)
        run: bash scripts/tests/probe-derive-next-version.sh

      - name: Probe — derive-release-artifacts PR URL is resolved, never scraped
        run: bash scripts/tests/probe-derive-pr-url-resolution.sh

      # ── 8d-2. Skills standard guard (Day 116 root-fix) ───────────────────────
      #    `grep -rln 'skills' .github/workflows/` on this repo used to return
      #    EMPTY — no CI job ever opened a skill's diff. Two doc PRs merged on
      #    a green Gates that only proved the TypeScript library builds. This
      #    step is diff-scoped: it validates every skills/<name>/ directory
      #    the PR's diff touches against skill-standard-v2.md (frontmatter,
      #    description trigger clause, body length, no "SELLABLE AS" heading,
      #    resolvable relative links, evals/evals.json shape) — three-state
      #    exit (0 conform / 1 violation named / 2 refuses to judge, naming
      #    what it could not read). See scripts/skills-standard-guard.mjs
      #    header for the full "why", including why it is diff-scoped rather
      #    than a full-tree scan. PR-ONLY: BASE_REF...HEAD needs the PR's real
      #    head SHA, not the synthetic pull_request merge commit (same
      #    reasoning as the release artifacts guard above).
      - name: Skills standard guard
        if: github.event_name == 'pull_request'
        env:
          SKILLS_GUARD_HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: node scripts/skills-standard-guard.mjs

      - name: Probe — skills standard guard bites
        run: bash scripts/tests/probe-skills-standard-guard.sh

      # ── 8e. PR title matches diff guard ──────────────────────────────────────
      #    A merge title is a hand-typed claim about an artifact a machine can
      #    read (the diff). PR-ONLY, same shape as the release artifacts guard:
      #    a diff that touches src/components/ must have its title name at
      #    least one component the diff really adds/touches.
      #    Escape hatch: HEAD commit message carries
      #    `// allow-title-diff-mismatch: <reason>`.
      #
      #    `actions/checkout@v4` on `pull_request` checks out the SYNTHETIC
      #    `refs/pull/N/merge` ref, whose HEAD subject is
      #    `"Merge <sha> into <sha>"` — a string NOBODY wrote. Reading that as
      #    the "title" finds no component token on every PR touching
      #    src/components/ and blocks all of them, honest or not. So this step
      #    passes the REAL PR title explicitly (PR_TITLE_GUARD_SUBJECT) and
      #    diffs the REAL base/head SHAs of the PR, never the merge ref's own
      #    parent.
      #    Three-state exit contract (0 PASS / 1 VIOLATION / 2 REFUSES TO
      #    JUDGE — the guard could not obtain its own instrument, e.g. a git
      #    command failed or CI withheld PR_TITLE_GUARD_SUBJECT). Both
      #    non-zero codes fail this step; the `set -o pipefail` + exit-code
      #    branch below makes the TWO KINDS OF RED distinguishable in the
      #    log instead of collapsing into one generic step failure.
      - name: PR title matches diff guard
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE_GUARD_SUBJECT: ${{ github.event.pull_request.title }}
          PR_TITLE_GUARD_BASE_REF: ${{ github.event.pull_request.base.sha }}
          PR_TITLE_GUARD_HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          node scripts/pr-title-matches-diff-guard.mjs
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "::error::PR title matches diff guard REFUSES TO JUDGE (exit 2) — it could not obtain its own instrument, see the guard's own stderr above. This is NOT a title/diff violation."
            exit 2
          elif [ "$code" -ne 0 ]; then
            echo "::error::PR title matches diff guard BLOCKED (exit $code) — the title does not match its own diff, see the guard's own stderr above."
            exit "$code"
          fi

      # ── 8e-2. Same guard, run against the artifact that actually lies ──────
      #    A PR title is correct by the time it merges — GitHub keeps it
      #    honest at review time. The squash-MERGE COMMIT SUBJECT is typed by
      #    a human in GitHub's merge box, independent of the PR title, and
      #    nothing upstream verifies it. On push:main, HEAD is that merge
      #    commit; PR_TITLE_GUARD_BASE_REF=HEAD^ diffs it against its own
      #    first parent so the guard reads the merge commit's own subject
      #    against the merge commit's own diff — the exact artifact/diff pair
      #    the real incident lived in.
      #    Same three-state contract and same distinguishable-red handling as
      #    the pull_request step above.
      - name: Merge commit title matches diff guard (push:main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PR_TITLE_GUARD_BASE_REF: HEAD^
        run: |
          set +e
          node scripts/pr-title-matches-diff-guard.mjs
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "::error::Merge commit title matches diff guard REFUSES TO JUDGE (exit 2) — it could not obtain its own instrument, see the guard's own stderr above. This is NOT a title/diff violation."
            exit 2
          elif [ "$code" -ne 0 ]; then
            echo "::error::Merge commit title matches diff guard BLOCKED (exit $code) — the merge commit subject does not match its own diff, see the guard's own stderr above."
            exit "$code"
          fi

      - name: Probe — PR title matches diff guard bites
        run: bash scripts/tests/probe-pr-title-matches-diff.sh

      # ── 8f. Theme tokens declared guard ──────────────────────────────────────
      #    A Tailwind color utility consumed anywhere in src/** must resolve
      #    to a `--color-*` variable this library actually declares in
      #    src/styles.css — and every declared custom token must be consumed
      #    somewhere. Source-level, runs on src/** directly (no build step
      #    needed). Three-state exit (0 pass / 1 violation / 2 refuses to
      #    judge — could not read its own inputs), same shape as the PR-title
      #    guard above.
      - name: Theme tokens declared guard
        run: node scripts/theme-tokens-declared-guard.mjs

      - name: Probe — theme tokens declared guard bites
        run: bash scripts/tests/probe-theme-tokens-declared-guard.sh

      # ── 9. Build (tsup ESM+CJS+DTS) ──────────────────────────────────────────
      - name: Build
        run: pnpm build

      # ── 9b. No hardcoded words guard (SIN-01) ────────────────────────────────
      #    This library ships ZERO user-facing words of its own — every
      #    user-facing string is a HOST-supplied prop (bilingual FR+EN by
      #    design). Scans the BUILT artifact (dist/index.cjs), never source —
      #    what ships is what matters; source-level greps missed 3 of the 4
      #    forms this guard now covers (see the guard's own header comment).
      #    EXPECTED RED until the currently-known offenders are fixed by other
      #    PRs (tracked separately) — this guard's job is to make the
      #    remaining list machine-derived, not to fix it in this PR.
      - name: No hardcoded words guard (SIN-01)
        run: node scripts/no-hardcoded-words-guard.mjs

      - name: Probe — no hardcoded words guard bites
        run: bash scripts/tests/probe-no-hardcoded-words-guard.sh

      # ── SELF-GATE — the guard's own three-state discipline is DERIVED, ──────
      #    never asserted from memory (see .claude/rules/derive-never-type.md,
      #    eta-workspace/.claude/rules/three-state-verdict.md — the doctrine PR
      #    #131 implements: a two-state instrument answering a three-state
      #    question is a defect, and `exit(2)` "REFUSING TO JUDGE" must stay
      #    distinct from `exit(1)` a real measured violation). The count below
      #    is READ from the guard's own shipped source, not typed by hand — if
      #    a future edit drops the third state back to a bare throw/exit(1),
      #    this step goes to zero and fails loud, instead of the drift passing
      #    silently.
      - name: SELF-GATE — derive process.exit(2) refusal-path count from the guard's own source
        run: |
          COUNT=$(grep -c 'process.exit(2)' scripts/no-hardcoded-words-guard.mjs)
          echo "SELF-GATE: no-hardcoded-words-guard.mjs declares ${COUNT} process.exit(2) refusal path(s)."
          if [ "${COUNT}" -lt 1 ]; then
            echo "::error::SELF-GATE — no-hardcoded-words-guard.mjs has ZERO process.exit(2) refusal paths. The three-state discipline (PR #131) has regressed to two states."
            exit 1
          fi

      # ── Real-browser e2e (native <dialog>) ───────────────────────────────────
      # Without these two steps the suite added by this PR would exist and never
      # RUN: vitest excludes e2e/** and nothing else invoked it. A test nobody
      # executes is not a test — Verification != Activation.
      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Real-browser e2e — native <dialog> behaviour
        run: pnpm test:browser

      # ── 10. Sandbox install + build (Next.js — Rule #19) ─────────────────────
      #    The sandbox is a standalone pnpm project (not a workspace member).
      #    Install its deps first (including the freshly built local lib via file:..).
      - name: Install sandbox dependencies
        working-directory: sandbox
        run: pnpm install --frozen-lockfile

      - name: Sandbox build
        run: pnpm sandbox:build

      # ── 11. React-doctor (Dimension 12) — PINNED 0.2.11, NEVER @latest ───────
      #    --diff origin/main  → scan only changed files vs main
      #    --fail-on error     → exit non-zero on any error-level diagnostic
      #    --annotations       → surface findings as GitHub Actions annotations
      - name: React-doctor
        run: >
          npx react-doctor@0.2.11
          --diff origin/main
          --fail-on error
          --annotations
          .

  # ── derive-release-artifacts — the OTHER half of the TOCTOU fix ────────────
  #    Runs ONLY on push:main. It writes the derived values from what the
  #    registry / src/index.ts actually say, never from a human-typed digit (a
  #    component PR carries no version/count edit by construction — see the
  #    Release artifacts guard step above — so main is the ONLY place these
  #    values are legitimately written).
  #
  #    It deliberately does NOT depend on the Gates job. It used to: `needs:
  #    [ci]`. That made it a repair job that only ran when the thing it repairs
  #    was already correct — a deadlock, observed for real. A stale derived
  #    artifact turns Gates red; Gates being red made GitHub skip this job; so
  #    the drift could never be repaired, and with Gates a required check, NO
  #    PR could merge — not even the one fixing it. A remedy must not depend on
  #    the absence of the disease it treats.
  derive-release-artifacts:
    name: Derive release artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      # `gh pr create` below is a GraphQL createPullRequest call, and it needs
      # its own scope: with `contents: write` alone the branch pushes fine and
      # the PR call dies with "Resource not accessible by integration". That is
      # exactly what happened on every merge for a week — the branch landed,
      # the PR never opened, and the orphan bot/derive-* branches are the
      # tombstones. The job went red loudly; nobody read it, which is its own
      # lesson.
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN: a push made with it does NOT retrigger
          # workflows (GitHub's own loop-prevention) — no infinite loop.

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Resolve the version to publish next — READ from the npm registry, ──
      #    cache-busted, NEVER from `npm view` (its cache lies — see
      #    .claude/rules/derive-never-type.md) and NEVER a hand-typed digit.
      #    Loud failure if the registry cannot be reached: an absence of
      #    signal is never read as "keep the old version".
      - name: Derive next version from the npm registry
        id: derive-version
        run: node scripts/derive-next-version.mjs

      # ── Regenerate the derived counts (producer, no --check: WRITES) ───────
      - name: Regenerate docs counts
        run: pnpm docs:counts

      # ── Verify the derived docs, HERE, where they have just been produced ──
      #    Both checks are loud by construction: if the producer wrote counts
      #    that still disagree with src/index.ts, the producer itself is broken,
      #    and main goes red rather than pushing a doc that lies.
      - name: Verify derived counts
        run: pnpm docs:counts --check

      # ── Regenerate registry.json (producer, no --check: WRITES) ────────────
      #    Same split as the counts above: a component PR carries no
      #    registry.json edit (release-artifacts-guard refuses it on the PR
      #    side), so main is the only legitimate writer. See
      #    scripts/registry-json-derive.mjs's header for the full "why".
      - name: Regenerate registry.json
        run: pnpm registry:derive

      - name: Verify derived registry.json
        run: pnpm registry:derive --check

      # The dedicated config is not a detail: the shared config EXCLUDES this
      # directory (a PR must not be forced to touch derived counts), and that
      # exclusion also silenced the suite when asked for BY NAME — it collected
      # ZERO tests and exited green. So the run is followed by a count assertion:
      # a guard that measures nothing must never be mistaken for a guard that
      # found nothing.
      #
      # The count is read from vitest's JSON reporter — a MACHINE output — and
      # not scraped from its human report. The first version of this assertion
      # grepped `^ *Tests +[1-9]` against the pretty printer, and vitest slips
      # ANSI colour codes between "Tests" and the number: the pattern could never
      # match on a real runner. It declared "ZERO tests collected" about a run
      # that had just passed 10, and took main down with it.
      #
      # A guard that parses decorated prose is a guard that reads a value a
      # machine already publishes. The producer emits a number; read the number.
      - name: Verify derived docs suite (its own config — excluded from the PR run by design)
        run: |
          set -o pipefail
          pnpm vitest run --config vitest.derived.config.ts --reporter=json --outputFile=/tmp/derived.json
          COLLECTED=$(node -e "const r=require('/tmp/derived.json');console.log(r.numTotalTests ?? 0)")
          echo "derived-docs suite collected ${COLLECTED} test(s)."
          if [ "${COLLECTED}" -lt 1 ]; then
            echo "::error::the derived-docs suite collected ZERO tests — it is guarding nothing. Refusing to pass."
            exit 1
          fi

      # main is a protected branch, so the bot CANNOT push to it directly
      # (GH006) — and that is the protection working, not a fault to route
      # around. It opens a PR instead and asks GitHub to auto-merge it once
      # Gates is green.
      #
      # KNOWN, DECLARED LIMITATION (measured, not theoretical): a PR opened by
      # a bot using the default GITHUB_TOKEN has its `pull_request` run parked
      # by GitHub in `action_required` until a human clicks "Approve and run".
      # Gates is a REQUIRED check with strict mode, so a check that can never
      # START leaves the PR blocked forever — silently, a green that never
      # arrives rather than a red anyone reads. Closing this gap needs a
      # non-default credential for `gh pr create` (a deploy key or app token
      # whose PRs are not subject to the fork-approval gate) — a credential
      # decision, not a YAML change, and it is not made here. Until it is,
      # every release needs one human "Approve and run" click on this PR.
      #
      # The `// allow-release-artifacts:` marker must sit in the HEAD commit's
      # message — this is the one PR that legitimately carries the derived
      # artifacts, and release-artifacts-guard reads that commit to allow it.
      - name: Open a PR with the derived artifacts (main is protected)
        if: steps.derive-version.outputs.next_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "derive-release-artifacts: no drift — nothing to commit."
            exit 0
          fi
          VERSION="${{ steps.derive-version.outputs.next_version }}"
          BRANCH="bot/derive-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stable name (no SHA suffix): every merge that derives the SAME
          # VERSION reuses the SAME branch, so --force-with-lease below
          # updates the ONE existing branch/PR instead of opening a new one
          # each merge. `checkout -B` (create-or-reset), not `-b`: within a
          # single job run this checkout only ever runs once, so `-b` would
          # also work today — but `-B` is the create-or-reset form and stays
          # correct if this step is ever retried within the same job (a local
          # branch of the same name would already exist from the first
          # attempt) or if a future change starts fetching bot/derive refs
          # before this point. NOTE: `actions/checkout@v4` above only fetches
          # the triggering ref (main); it does NOT fetch other branches, so
          # there is no local remote-tracking ref for bot/derive-* here
          # regardless of `-b` vs `-B` — force-with-lease's protection in
          # this job therefore still comes from the *rename* (stable name),
          # not from a pre-fetched lease value; it guards against two
          # concurrent runs racing on push, per git's documented fallback
          # when no remote-tracking ref is known locally.
          git checkout -B "$BRANCH"
          git add package.json src/version.ts README.md docs/components-catalog.md registry.json
          git commit -m "chore(release): derive version ${VERSION} + docs counts + registry.json

          Derived from the artifact, never hand-typed: version from the npm
          registry, counts from src/index.ts, registry.json from the exported
          component directories.

          // allow-release-artifacts: this is the derive commit — it is the one
          commit that is SUPPOSED to carry version, counts and registry.json,
          and its content is the deriver's output, byte for byte."

          # BRANCH is derived from version+SHA, so a re-run of the same commit
          # computes the identical name. The prior attempt may already have
          # pushed it before dying further down the step — that push must not
          # be treated as a foreign edit to protect against, it is this same
          # job's own prior attempt. --force-with-lease (never a blind --force)
          # updates it safely without a human deleting branches by hand.
          git push --force-with-lease origin "$BRANCH"

          # `gh pr create` fails if a PR already exists for this head — the
          # ONLY condition allowed to be non-fatal here. Any other failure
          # (bad token, network, branch protection, etc.) stays fatal.
          set +e
          CREATE_OUTPUT=$(gh pr create --base main --head "$BRANCH" \
            --title "chore(release): derive version ${VERSION} + docs counts + registry.json" \
            --body "Derived on main after merge, by the bot. Version read from the npm registry, counts from \`src/index.ts\`, \`registry.json\` from the exported component directories — nothing hand-typed. Needs one human \"Approve and run\" click on the Gates check (bot-opened PR, see workflow comment above)." 2>&1)
          CREATE_RC=$?
          set -e
          echo "${CREATE_OUTPUT}"

          if [ ${CREATE_RC} -eq 0 ]; then
            echo "derive-release-artifacts: opened a new PR for ${BRANCH}."
          elif echo "${CREATE_OUTPUT}" | grep -qi "already exists"; then
            echo "derive-release-artifacts: a PR for ${BRANCH} already exists — reusing it (re-run path)."
          else
            echo "::error::gh pr create failed for a reason other than 'PR already exists' — not papering over it."
            exit ${CREATE_RC}
          fi

          # PR_URL is a value GitHub already holds — resolved from the
          # artifact, never scraped from gh's stdout/stderr. CREATE_OUTPUT
          # above decides WHICH PATH was taken; its exact text never becomes
          # data. If gh cannot resolve the URL, that is fatal: an empty arg
          # to `gh pr merge` would be exactly the silent-wrong-thing this repo
          # bans.
          PR_URL=$(gh pr view "$BRANCH" --json url --jq .url)
          if [ -z "${PR_URL}" ]; then
            echo "::error::could not resolve the PR URL for branch ${BRANCH} via 'gh pr view' — refusing to call 'gh pr merge' with an empty URL."
            exit 1
          fi

          gh pr merge --auto --squash "${PR_URL}"
